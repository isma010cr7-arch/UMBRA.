<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRA | Parfums d'Exception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* FONTO DE PARTÍCULAS DORADAS */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 1s ease;
        }
        .loader-line { width: 0; height: 1px; background: #9c8441; animation: load 1.2s ease forwards; }
        @keyframes load { to { width: 200px; } }

        /* CONTENEDOR */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 400px;
            /* Subimos el contenedor para alejarlo del pie de página */
            margin-top: -5vh; 
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 1.5s;
        }

        .logo-img {
            width: 100%;
            max-width: 350px;
            height: auto;
            margin-bottom: 5px;
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(156, 132, 65, 0.2));
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 10px;
            color: #9c8441;
            text-transform: uppercase;
            margin-bottom: 80px; /* Más espacio entre subtítulo y botón */
            font-weight: 200;
            opacity: 0.7;
        }

        .btn {
            display: inline-block;
            padding: 18px 55px;
            border: 1px solid rgba(156, 132, 65, 0.5);
            color: #9c8441;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            border-color: #9c8441;
            background: #9c8441;
            color: #000;
            box-shadow: 0 0 50px rgba(156, 132, 65, 0.4);
            transform: scale(1.05);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.5rem;
            letter-spacing: 5px;
            color: #444;
            width: 100%;
            text-align: center;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-line"></div></div>
    
    <canvas id="particles-js"></canvas>

    <div class="container">
        <img src="logo.png" alt="UMBRA" class="logo-img">
        <p class="subtitle">ELEVATE YOUR SCENT</p>
        <a href="https://wa.me/34636265430" class="btn">ENTER THE VAULT</a>
    </div>

    <footer>ESPARREGUERA | EXCLUSIVE SELECTION</footer>

    <script>
        // Animación de partículas simple
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#9c8441';
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            }, 1000);
        };
    </script>
</body>
</html>
