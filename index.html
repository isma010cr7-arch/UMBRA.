<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRA | Parfums d'Exception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            /* Fondo con más profundidad */
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* --- EFECTO DE CARGA INICIAL --- */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 1s ease;
        }

        .loader-line {
            width: 0;
            height: 1px;
            background: #9c8441;
            animation: load 1.5s ease-in-out forwards;
        }

        @keyframes load {
            0% { width: 0; }
            100% { width: 150px; }
        }

        /* --- CONTENEDOR PRINCIPAL CON ANIMACIÓN --- */
        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s ease forwards 1.8s; /* Empieza después del loader */
        }

        .logo-img {
            width: 100%;
            max-width: 420px;
            height: auto;
            margin-bottom: 10px;
            /* Movimiento suave infinito */
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(156, 132, 65, 0.15));
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 8px;
            color: #9c8441;
            text-transform: uppercase;
            margin-bottom: 60px;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 2s ease forwards 2.5s;
        }

        /* --- BOTÓN CON EFECTO --- */
        .btn {
            display: inline-block;
            padding: 18px 50px;
            border: 1px solid #9c8441;
            color: #9c8441;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .btn:hover {
            color: #000;
            background: #9c8441;
            box-shadow: 0 0 40px rgba(156, 132, 65, 0.4);
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.5rem;
            letter-spacing: 4px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-line"></div>
    </div>

    <div class="container">
        <img src="logo.png" alt="UMBRA" class="logo-img">
        <p class="subtitle">ELEVATE YOUR SCENT</p>
        
        <a href="https://wa.me/34636265430?text=Hola,%20vengo%20de%20la%20web%20y%20me%20gustaría%20ver%20vuestro%20catálogo." class="btn">
            ENTER THE VAULT
        </a>
    </div>

    <footer>ESPARREGUERA | EXCLUSIVE FRAGRANCES</footer>

    <script>
        // Quitar el loader cuando cargue
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(function() {
                    document.getElementById('loader').style.display = 'none';
                }, 1000);
            }, 1500);
        };
    </script>

</body>
</html>
